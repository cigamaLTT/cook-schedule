<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Cook Schedule</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--accent-blue);
            border-radius: 1rem;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #0f172a;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            text-align: center;
        }

        .logout-message {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--accent-blue);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🍳</div>
            <h1
                style="font-size: 1.5rem; margin-bottom: 0.5rem; background: none; -webkit-text-fill-color: initial; color: white;">
                Cook Schedule</h1>
            <p style="color: var(--text-secondary); font-size: 0.875rem;">Hệ thống quản lý lịch trực bếp</p>
        </div>

        <div class="glass card">
            <h2 style="font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center;">Đăng nhập</h2>

            <div th:if="${param.error}" class="error-message">
                Tên đăng nhập hoặc mật khẩu không đúng.
            </div>

            <div th:if="${param.logout}" class="logout-message">
                Bạn đã đăng xuất thành công.
            </div>

            <form th:action="@{/login}" method="post">
                <div style="margin-bottom: 1.25rem;">
                    <label
                        style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Username</label>
                    <input type="text" name="username" required autofocus placeholder="Tên đăng nhập"
                        style="margin-bottom: 0;" />
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label
                        style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">Password</label>
                    <input type="password" name="password" required placeholder="••••••••" style="margin-bottom: 0;" />
                </div>

                <button type="submit" style="width: 100%; padding: 0.875rem;">Đăng nhập</button>
            </form>
        </div>

        <p style="text-align: center; margin-top: 2rem; font-size: 0.75rem; color: var(--text-secondary);">
            &copy; 2026 Cigama Cook Schedule. All rights reserved.
        </p>
    </div>
</body>

</html>
